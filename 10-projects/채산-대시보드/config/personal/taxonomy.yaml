      merchant_contains: [Apple, 구글페이먼트, 넷플릭스, 디즈니, 멜론, 유튜브]

OPEX-NETPAY:
  category: 운영비
  name: 네이버페이 결제 (식단·배달)
  rules:
    - source: card
      merchant_contains: [네이버페이 네이버]

OPEX-CARD-UNCLEAR:
  category: 운영비
  name: 카드결제 (상세없음)
