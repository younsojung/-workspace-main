# 개인 채산표 — 지출 분류 v2 (회사 관리기준 매핑)
# 법인과 일관성: 보험은 별도 카테고리
version: "2.0"
updated: "2026-05-20"

# ========================================
# 임대료 (RENT) — 주거비
# ========================================
RENT-HOME:
  category: 임대료
  name: 월세·관리비
  rules:
    - source: bank_out
      content_contains: [신성수, 동산빌라, 월세, 관리비]

RENT-UTILITY:
  category: 임대료
  name: 전기·공과금
  rules:
    - source: bank_out
      content_contains: [전기, 한국전력]
    - source: card
      merchant_contains: [한국전력]

RENT-INTERIOR:
  category: 임대료
  name: 주거·인테리어
  rules:
    - source: card
      merchant_contains: [서해벽지, 장판, 타일, 이화타일]

# ========================================
# 인건비 (LABOR) — 인적 지출 (교육비)
# ========================================
LABOR-EDU-CHILD:
  category: 인건비
  name: 자녀 교육 (체능단·학원)
  rules:
    - source: card
      merchant_contains: [한솔교육, 플레이타임, 한전아트]

LABOR-EDU-SPOUSE:
  category: 인건비
  name: 가족 교육 (남편)
  rules:
    - source: card
      merchant_contains: [뉴로퓨전]

LABOR-PERSONAL-PAY:
  category: 인건비
  name: 인적 이체 (퇴직금·기타)
  rules:
    - source: bank_out
      content_contains: [최니라]

# ========================================
# 관리비 (MGMT) — 통신
# ========================================
MGMT-TELECOM:
  category: 관리비
  name: 통신비
  rules:
    - source: card
      merchant_contains: [SK통신, KT, SKT, LGU+, "LG U+"]

# ========================================
# 세금 (TAX) — 국민건강 포함 (사용자 정정: 국민건강은 세금 성격)
# ========================================
TAX-HEALTH:
  category: 세금
  name: 국민건강보험료
  rules:
    - source: bank_out
      content_contains: [국민건강]

# ========================================
# 보험 (INS) — 민영보험만
# ========================================
INS-PRIVATE:
  category: 보험
  name: 민영보험료
  rules:
    - source: card
      merchant_contains: [현대해상, DB손해, 삼성화재, 메리츠]
    - source: bank_out
      content_contains: [DB손, 현대해상, 메리츠통합, 한화손]

# ========================================
# 운영비 (OPEX) — 일상 생활비
# ========================================
OPEX-FEE:
  category: 운영비
  name: 세무·법무
  rules:
    - source: bank_out
      content_contains: [다옴세무, 세무, 회계]

OPEX-MED:
  category: 운영비
  name: 의료·건강
  rules:
