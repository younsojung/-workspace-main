  rules: []

OPEX-MISC:
  category: 운영비
  name: 운영비 기타 (자동 fallback)
  rules: []

TAX-OTHER:
  category: 세금
  name: 세금·공과금
  rules:
    - source: bank_out
      content_contains: [국세, 지방세, 부가가치세]
